<section class="board-page">
  <div class="board-page-div">
    <section class="board-page">
      <div class="board-page-div">
        <header class="board-page__header">
          <h1 class="board-page__title">Board</h1>
          <div class="search">
            <input
              type="text"
              placeholder="Find Task"
              class="search-input"
              [(ngModel)]="searchQuery"
              (ngModelChange)="onSearchChange()"
            />
            <button type="button" class="search__icon" aria-label="Search">
              <img src="assets/icons/search.png" alt="Search" />
            </button>
          </div>
          <div class="board-page__toolbar">
            <button type="button" class="add-task-btn" (click)="openAddTaskDialog()">
              <span class="btn-text">Add task</span
              ><img class="add-image" src="assets/icons/add.svg" alt="Add Task" />
            </button>
          </div>
        </header>
        @if (!isLoading) {
          <div class="board">
            @for (column of columns; track column.status) {
              <app-board-column
                [title]="column.title"
                [tasks]="column.tasks"
                [columnId]="column.status"
                [connectedDropLists]="dropListIds"
                [openMenuTaskId]="openMenuTaskId"
                (menuToggleGlobal)="onMenuToggle($event)"
                (taskSelected)="selectTask($event)"
                (addClicked)="addTask(column.status)"
                (taskDropped)="onTaskDropped($event)"
                (moveTask)="onMoveTask($event)"
              ></app-board-column>
            }
          </div>
        }
        @if (!isLoading && searchQuery && !hasFilteredTasks) {
          <div class="no-results">
            <p>No match found!</p>
          </div>
        }
        @if (showTaskDetail && selectedTask) {
          <app-task-detail-dialog
            [task]="selectedTask"
            (closed)="closeTaskDetail()"
            (taskUpdated)="onTaskUpdated()"
          ></app-task-detail-dialog>
        }
        @if (showAddTask) {
          <app-add-task-dialog (closed)="closeAddTask()"></app-add-task-dialog>
        }
      </div>
    </section>
  </div>
</section>
