<div class="column">
  <div class="column-header">
    <h2 class="column-title">{{ title }}</h2>
    @if (title !== 'Done') {
      <button class="btn-card" type="button" (click)="onAddTask()">+</button>
    }
  </div>
  <div
    #dropListRef
    [cdkDropListData]="tasks"
    [cdkDropListDisabled]="false"
    cdkDropList
    [id]="columnId"
    [cdkDropListConnectedTo]="connectedDropLists"
    (cdkDropListDropped)="onDrop($event)"
    (cdkDropListEntered)="onDropListEntered()"
    (cdkDropListExited)="onDropListExited()"
    [ngClass]="{ 'drag-over': isDragOver }"
    class="task-list"
  >
    @for (task of tasks; track task.id; let i = $index) {
      <div
        cdkDrag
        [cdkDragData]="task"
        (cdkDragStarted)="onDragStarted($event)"
        (cdkDragEnded)="onDragEnded($event)"
        (click)="onTaskSelected(task)"
        [ngClass]="{ dragging: draggedTaskIndex === i }"
        class="draggable-task"
        #taskElement
      >
        <app-task-card
          (moveTo)="onMoveFromMenu($event)"
          [menuOpen]="openMenuTaskId === task.id"
          (menuToggle)="onMenuToggle($event)"
          [task]="task"
        >
        </app-task-card>
      </div>
    }
    @if (getEmptyMessage()) {
      <div class="empty-message">
        {{ getEmptyMessage() }}
      </div>
    }
  </div>
</div>
<ng-template #previewContainer>
  <div class="drag-preview-custom"></div>
</ng-template>
